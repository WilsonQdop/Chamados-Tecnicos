jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key

spring.application.name=Chamadas


# Configurações de Banco de Dados
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/Chamadas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# Certifique-se de que não há espaços extras no início da linha
backup.execute.path=C:\Program Files\MySQL\MySQL Server 8.0\bin
backup.storage.location=./backups/
database.name=Chamadas

server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=123456
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=minha-api



